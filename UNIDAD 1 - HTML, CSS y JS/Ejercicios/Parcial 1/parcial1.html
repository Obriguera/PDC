<!DOCTYPE html>
<html lang="Es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P1 - Globos Dinámicos</title>
    <link rel="stylesheet" href="./parcial1.css">
</head>
<body>
    <h1>Globos dinamicos</h1>
    <p>Escribi la cantidad de globos a generar y su tamaño. Una vez generado podes clickear cada globo hasta 7 veces antes de que explote. Con cada click cambia de color</p>

    <form onsubmit="return false;">
        <label for="cantidadGlobos">¿Cuantos globos?</label>
        <input type="number" id="cantidadGlobos" placeholder="0" required min="0" max="100">
        <label for="altoGlobos">Altura en PX (entre 50 y 90)</label>
        <input type="number" id="altoGlobos" placeholder="50" required min="50" max="90">
        <label for="anchoGlobos">Ancho en PX (entre 50 y 90)</label>
        <input type="number" id="anchoGlobos" placeholder="50" required min="50" max="90">
        <button id="generador" type="submit">Crear</button>
    </form>

    <div style="background-color: red;" id="misGlobos">

        <div class="globo"> </div>

    </div>

    <script src="./parcial1.js"></script>
</body>
</html>
